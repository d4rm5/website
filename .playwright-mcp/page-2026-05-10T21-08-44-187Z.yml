      - generic [ref=e22]:
        - heading "Feed your mind with RSS feeds" [level=2] [ref=e23]
        - paragraph [ref=e24]:
          - text: RSS es un protocolo del año 1999, donde no existen algoritmos de recomendación, sugerencias ni censura. El dueño del contenido mantiene su
          - emphasis [ref=e25]: Feed
          - text: de la forma que desee, con el contenido que desee y lo distribuye al mundo digital donde cada usuario lo consume de la forma que desee.
        - paragraph [ref=e26]: Gran herramienta de higiene digital. No hace falta que abandones YouTube o Reddit, ellos tienen sus propios mecanismos de RSS para que puedas seguir el contenido que te interesa.
        - paragraph [ref=e27]:
          - text: Personalmente consumo feeds desde NetNewsWire para articulos (Apple) y Pocket Casts para podcasts (Multiplataforma). Te recomiendo leer
          - link "https://aboutfeeds.com" [ref=e28] [cursor=pointer]:
            - /url: https://aboutfeeds.com
          - text: si te interesa saber más sobre el tema.
        - 'heading "Tether: deuda del tesoro y leche con proteína" [level=2] [ref=e29]'
        - paragraph [ref=e30]:
          - text: No pude resistirme a comprar la oferta de 25% de descuento en leche Las Tres Niñas con 50 g de proteína. Siempre pensé que Las Tres Niñas era una marca de La Serenísima, pero cuando la doy vuelta me di cuenta que en realidad es de
          - strong [ref=e31]: Adecoagro
          - text: .
        - paragraph [ref=e32]:
          - img "Leche Las Tres Niñas, de Adecoagro" [ref=e33]
        - paragraph [ref=e34]:
          - text: Esto hubiese pasado de largo si no fuese porque recordé que hace casi exactamente un año,
          - strong [ref=e35]: Tether
          - text: compró el 70% de esta empresa argentina. Es impresionante lo gigante que es esta empresa, que es la creadora del maravilloso USDT, usado al mismo tiempo por traders alrededor del globo y por cientos de miles de argentinos que se acostumbraron a utilizarlo por escapar del cepo.
        - paragraph [ref=e36]: Tether es uno de los veinte acreedores más grandes del Tesoro de los Estados Unidos, teniendo más deuda del tesoro que potencias como Alemania o Corea del Sur. Esta masa crítica de deuda es el núcleo de su modelo de negocio, sus usuarios le dan 1 USD y reciben 1 USDT, mientras tanto Tether compra deuda del tesoro y gana ~4% anual sobre ese dólar sin darle ningún rendimiento a su cliente.
        - blockquote [ref=e38]:
          - paragraph [ref=e39]:
            - link "View post on X" [ref=e40] [cursor=pointer]:
              - /url: https://x.com/tether/status/1917593669932134442
        - paragraph [ref=e41]:
          - text: Actualmente el circulante de USDT es de 190B de dólares, hagan la cuenta a 4% anual y se darán cuenta de donde sale este imperio, que está apostando fuerte por diversificarse en energía, agro y hasta servicios telefónicos. Pueden ver más en
          - link "su reporte del Q1 2026" [ref=e42] [cursor=pointer]:
            - /url: https://tether.io/news/tether-posts-1-04b-q1-2026-profit-despite-highly-volatile-global-markets-reaches-all-time-highs-8-23b-reserve-buffer-and-maintains-u-s-treasury-heavy-backing/
          - text: .
        - paragraph [ref=e43]: En simultáneo de estos pensamientos se subía la entrevista de La Fábrica Podcast a Mariano Bosch, el fundador de Adecoagro. Me encanta conocer como se fundaron estos negocios desde adentro, y la anécdota sobre la adquisión de Tether es espectacular.
