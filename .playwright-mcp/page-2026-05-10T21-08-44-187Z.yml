        - heading "Markdown es HTML" [level=2] [ref=e52]
        - paragraph [ref=e53]: La popularización de markdown es un side-effect positivo de la masificación del uso de LLMs. Skills, prompts, SOUL y que se yo más usan este lenguaje de marcado tan hermoso y práctico.
        - paragraph [ref=e54]: "En mi timeline estuvo apareciendo una discusión berreta alrededor de HTML, markdown, cual es mejor para hablar con agentes y que se yo. Bueno, esta sección de las weeknotes es para recordarte que MARKDOWN ES HTML, literalmente:"
        - blockquote [ref=e55]:
          - paragraph [ref=e56]:
            - text: Markdown is not a replacement for HTML, or even close to it. Its syntax is very small, corresponding only to a very small subset of HTML tags. The idea is
            - emphasis [ref=e57]: not
            - text: to create a syntax that makes it easier to insert HTML tags. In my opinion, HTML tags are already easy to insert. The idea for Markdown is to make it easy to read, write, and edit prose. HTML is a
            - emphasis [ref=e58]: publishing
            - text: format; Markdown is a
            - emphasis [ref=e59]: writing
            - text: format. Thus, Markdown’s formatting syntax only addresses issues that can be conveyed in plain text.
        - paragraph [ref=e60]:
          - link "https://daringfireball.net/projects/markdown/syntax#html" [ref=e61] [cursor=pointer]:
            - /url: https://daringfireball.net/projects/markdown/syntax#html
